<html>
<body style="background:#0F0F0F;color:#FFFFFF;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;margin:0;padding:40px 20px;">
  <div style="max-width:400px;margin:0 auto;">
    <p style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#8B8B8B;margin-bottom:24px;">Workout Logger</p>
    <h1 style="font-size:22px;font-weight:800;margin-bottom:8px;">Your login code</h1>
    <p style="font-size:14px;color:#8B8B8B;margin-bottom:32px;">Enter this code in the app to sign in.</p>
    <div style="background:#1A1A1A;border:1px solid #2D2D2D;padding:24px;text-align:center;margin-bottom:32px;">
      <span style="font-size:40px;font-weight:700;letter-spacing:0.2em;font-variant-numeric:tabular-nums;">{{ .Token }}</span>
    </div>
    <p style="font-size:12px;color:#555555;">This code expires in 1 hour. If you didn't request this, you can ignore this email.</p>
  </div>
</body>
</html>
